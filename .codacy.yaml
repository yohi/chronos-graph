---
# Global exclusion for dialect-specific SQL files and agent guidelines that cause false positives
exclude_paths:
  - "src/context_store/storage/migrations/sqlite/*.sql"
  - "src/context_store/storage/migrations/postgres/*.sql"
  - "AGENTS.md"

engines:
  bandit:
    exclude_paths:
      - "tests/**"
  sonarjs:
    patterns:
      - name: "S5144"
        enabled: false
  remark-lint:
    patterns:
      - name: "undefined-acronym"
        enabled: false
