services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: root
    volumes:
      - .:/workspaces/chronos-graph
    working_dir: /workspaces/chronos-graph
    command: ["bash", "-c", "ruff check --no-cache src/ tests/ && ruff format --no-cache src/ tests/ && mypy src/"]
    profiles:
      - lint

  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: chronos-graph-postgres:latest
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: context_store
      POSTGRES_USER: context_store
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context_store -d context_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/dev_password
      NEO4J_dbms_jvm_additional: "-Djava.net.preferIPv4Stack=true"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chronos-dashboard:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: root
    volumes:
      - .:/workspaces/chronos-graph
    working_dir: /workspaces/chronos-graph
    command: ["python", "-m", "context_store.dashboard.api_server"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - DASHBOARD_HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
