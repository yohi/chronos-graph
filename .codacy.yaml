---
# Global exclusion for dialect-specific SQL files that cause false positives
exclude_paths:
  - "src/context_store/storage/migrations/sqlite/*.sql"
  - "src/context_store/storage/migrations/postgres/*.sql"

engines:
  bandit:
    exclude_paths:
      - "tests/**"
  sonarjs:
    patterns:
      - name: "S5144"
        enabled: false
