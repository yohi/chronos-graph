repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: ruff check
        language: system
        types: [python]

      - id: ruff-format-check
        name: ruff-format-check
        entry: ruff format --check
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
