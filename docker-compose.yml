services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: "1000:1000"
    volumes:
      - .:/workspaces/chronos-graph
    working_dir: /workspaces/chronos-graph
    command: ["bash", "-c", "ruff check --no-cache src/ tests/ && ruff format --no-cache src/ tests/ && mypy src/"]
    profiles:
      - lint

  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: chronos-graph-postgres:latest
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: context_store
      POSTGRES_USER: context_store
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context_store -d context_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/dev_password
      NEO4J_dbms_jvm_additional: "-Djava.net.preferIPv4Stack=true"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dashboard service (design doc §2.2, §6 Phase 5)
  # - Binds to 127.0.0.1:8000 to block external access at network layer
  # - Security is layered: Docker port-forward + TrustedHostMiddleware
  # - Read-Only CQRS: accesses only existing DB, no writes
  chronos-dashboard:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: root
    working_dir: /workspaces/chronos-graph
    command:
      - "bash"
      - "-c"
      - |
        cd /workspaces/chronos-graph
        uv sync --all-extras --quiet
        uv run chronos-dashboard
    ports:
      # 127.0.0.1 binding blocks access from outside the host (design doc §2.2)
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Override bind address inside container to accept Docker port-forward
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8000"
      # Allow both localhost and Docker gateway for TrustedHostMiddleware
      DASHBOARD_ALLOWED_HOSTS: "localhost,127.0.0.1"
    volumes:
      - .:/workspaces/chronos-graph
      # Share SQLite DB from host (read-only mount for safety)
      - ${SQLITE_DB_PATH:-~/.context-store}:/data/context-store:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/system/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dashboard

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
